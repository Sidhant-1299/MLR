name: Build and Publish Wheels for mlr

env:
  CI: true

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build_and_publish:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Eigen, Boost) on Ubuntu
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev libboost-all-dev

      - name: Add Symlink to the library ubuntu
        if: matrix.os == 'ubuntu-latest'
        run: echo "adding symlink to path"
          sudo ln -s /usr/include/eigen3/Eigen /usr/include/Eigen

      - name: Install dependencies (Eigen, Boost) on macOS
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install eigen boost
          sudo mkdir -p /usr/local/include
          sudo ln -s /opt/homebrew/include/eigen3/Eigen /usr/local/include/Eigen 
          sudo ln -s /opt/homebrew/include/boost /usr/local/include/boost

      - name: Install dependencies (Eigen, Boost) on Windows
        if: matrix.os == 'windows-latest'
        run: |
          echo "Eigen/Boost installation must be manually managed or vendored for Windows builds."

      - name: Install cibuildwheel and twine
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel twine

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse

      - name: Publish wheels to PyPI
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload wheelhouse/*.whl
