name: Build and Publish Wheels for mlr

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build_and_publish:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Eigen, Boost) on Ubuntu
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libeigen3-dev libboost-all-dev
          # Create correct Eigen symlink (points to parent dir)
          sudo ln -sf /usr/include/eigen3 /usr/include/Eigen || true

      - name: Install dependencies (Eigen, Boost) on macOS
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install eigen boost
          # Create correct symlinks for Homebrew-installed headers
          sudo mkdir -p /usr/local/include
          sudo ln -sf /opt/homebrew/include/eigen3 /usr/local/include/Eigen || true
          sudo ln -sf /opt/homebrew/include/boost /usr/local/include/boost || true

      - name: Install dependencies (Eigen, Boost) on Windows
        if: matrix.os == 'windows-latest'
        run: |
          echo "Windows builds require vendored Eigen/Boost in 'external/' folder"

      - name: Install cibuildwheel and twine
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel==2.16.2 twine

      - name: Build wheels
        env:
          # Platform-specific build settings
          CIBW_BEFORE_BUILD_LINUX: "true" # No-op (symlinks already created)
          CIBW_BEFORE_BUILD_MACOS: "true" # No-op (symlinks already created)
          CIBW_ENVIRONMENT: "EIGEN_INCLUDE_PATH=/usr/include/eigen3/Eigen BOOST_INCLUDE_PATH=/usr/include" # Linux
          CIBW_ENVIRONMENT_MACOS: "EIGEN_INCLUDE_PATH=/opt/homebrew/include/eigen3/Eigen BOOST_INCLUDE_PATH=/opt/homebrew/include" # macOS
        run: |
          cibuildwheel --output-dir wheelhouse

      - name: Publish wheels to PyPI
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload wheelhouse/*.whl
